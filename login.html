<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | بنيان</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f7f6;
        }
        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-box h2 { color: #181e36; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: #b08d57; }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #181e36;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        .auth-btn:hover { background: #b08d57; }
        .auth-footer { margin-top: 20px; font-size: 14px; color: #777; }
        .auth-footer a { color: #b08d57; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>تسجيل الدخول</h2>
            <form action="login_process.php" method="POST">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" name="email" required placeholder="example@mail.com">
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" name="password" required placeholder="********">
                </div>
                <button type="submit" class="auth-btn">دخول</button>
            </form>
            <p class="auth-footer">ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a></p>
        </div>
    </div>
</body>
</html>
